version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lumora
    ports:
      - '5432:5432'
    volumes:
      - lumora_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  api:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev:api"
    volumes:
      - ./:/app
    ports:
      - '8787:8787'
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lumora
      REDIS_URL: redis://redis:6379
      APP_URL: http://localhost:5173

volumes:
  lumora_postgres:
